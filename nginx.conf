# Configuración de Nginx para el frontend del Agente de Research
# Sirve los archivos estáticos y hace proxy de las llamadas /api/ al backend

server {
    listen 80;
    server_name _;

    # Archivos estáticos del frontend
    root /usr/share/nginx/html;
    index index.html;

    # Gzip para mejorar performance
    gzip on;
    gzip_types text/css application/javascript application/json text/plain text/xml;

    # Servir frontend: todas las rutas van a index.html (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy inverso hacia el backend FastAPI
    # Todas las llamadas a /api/* y /health se redirigen al backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Timeout extendido: Ollama local puede tardar 4-5 minutos en CPU
        proxy_read_timeout 360s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 360s;
    }

    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }

    # Cache de archivos estáticos
    location ~* \.(css|js|ico|png|jpg|svg)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
}
