services:

  # ────────────────────────────────────
  # Backend — FastAPI + Agente de Research
  # ────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: research-backend
    env_file: .env
    ports:
      - "8000:8000"     # Acceso directo a la API (para desarrollo/debug)
    volumes:
      - ./data:/app/data      # Persistencia: PDFs, ChromaDB, SQLite
      - ./backend:/app        # Hot reload en desarrollo (comentar en producción)
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ────────────────────────────────────
  # Ollama — Servidor LLM local
  # ────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: research-ollama
    ports:
      - "11434:11434"   # Acceso directo a Ollama (para debug)
    volumes:
      - ollama_data:/root/.ollama   # Modelos descargados (persistentes)
    restart: unless-stopped
    # Para usar GPU NVIDIA: descomentar las siguientes líneas
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ────────────────────────────────────
  # Frontend — Nginx sirviendo HTML/CSS/JS
  # ────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: research-frontend
    ports:
      - "80:80"         # Interfaz web principal
    volumes:
      - ./frontend:/usr/share/nginx/html:ro   # Archivos del frontend (solo lectura)
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro   # Configuración de Nginx
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost/ 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  # Volumen para los modelos de Ollama (pueden pesar varios GB)
  ollama_data:
    driver: local
